services:
  postgres:
    image: postgres:16-alpine
    container_name: docflow-postgres
    environment:
      POSTGRES_USER: docflow
      POSTGRES_PASSWORD: docflow
      POSTGRES_DB: docflow
    # Internal-only — no host port exposure (avoids conflicts with other DBs)
    expose:
      - "5432"
    volumes:
      - docflow-pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  docflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docflow-pro
    ports:
      - "3219:3219"
    environment:
      - NODE_ENV=production
      - PORT=3219
      - HOSTNAME=0.0.0.0
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3219}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@docflow.pro}
      - ADMIN_NAME=${ADMIN_NAME:-Super Admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY}
      - DATABASE_URL=postgresql://docflow:docflow@postgres:5432/docflow?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3219/api/auth/providers"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  docflow-pg-data:
