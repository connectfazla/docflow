version: '3.9'

services:
  docflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docflow-pro
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@docflow.pro}
      - ADMIN_NAME=${ADMIN_NAME:-Super Admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      # Uncomment to use bcrypt hash instead of plain password:
      # - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/auth/providers"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

